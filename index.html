<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMAGERY Assessment</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="home-page">
    <main class="landing-shell landing-shell--home">
      <section class="home-hero" aria-label="IMAGINE home hero">
        <div class="hero-atmosphere" aria-hidden="true">
          <div class="hero-haze hero-haze-a"></div>
          <div class="hero-haze hero-haze-b"></div>
          <div class="hero-grain"></div>
        </div>

        <div id="heroWord" class="hero-word" role="button" tabindex="0" aria-label="Enter assessment">
          <svg class="hero-filter" aria-hidden="true" focusable="false">
            <filter id="heroMistFilter" x="-20%" y="-30%" width="140%" height="180%">
              <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="8" result="noise">
                <animate attributeName="baseFrequency" dur="8s" values="0.008;0.014;0.008" repeatCount="indefinite"></animate>
              </feTurbulence>
              <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="B"></feDisplacementMap>
              <feGaussianBlur stdDeviation="0.2"></feGaussianBlur>
            </filter>
          </svg>
          <div class="word-mist word-mist-a" aria-hidden="true"></div>
          <div class="word-mist word-mist-b" aria-hidden="true"></div>
          <h1 class="word-base" aria-label="IMAGINE">
            <span class="word-base-text">IMA</span>
            <span class="hero-g" aria-hidden="true">
              <span class="hero-glyph hero-glyph-g">G</span>
              <span class="hero-glyph hero-glyph-motif hero-glyph-orbit">
                <span class="hero-orbit-ring hero-orbit-ring-a"></span>
                <span class="hero-orbit-ring hero-orbit-ring-b"></span>
                <span class="hero-orbit-dot hero-orbit-dot-a"></span>
                <span class="hero-orbit-dot hero-orbit-dot-b"></span>
                <span class="hero-orbit-dot hero-orbit-dot-c"></span>
              </span>
              <span class="hero-glyph hero-glyph-motif hero-glyph-flower">
                <span class="hero-flower-core"></span>
                <span class="hero-flower-petal hero-flower-petal-a"></span>
                <span class="hero-flower-petal hero-flower-petal-b"></span>
                <span class="hero-flower-petal hero-flower-petal-c"></span>
                <span class="hero-flower-petal hero-flower-petal-d"></span>
                <span class="hero-flower-petal hero-flower-petal-e"></span>
                <span class="hero-flower-petal hero-flower-petal-f"></span>
              </span>
              <span class="hero-glyph hero-glyph-motif hero-glyph-lines">
                <span class="hero-line hero-line-a"></span>
                <span class="hero-line hero-line-b"></span>
                <span class="hero-line hero-line-c"></span>
                <span class="hero-line hero-line-d"></span>
                <span class="hero-line-ring"></span>
              </span>
            </span>
            <span class="word-base-text">INE</span>
          </h1>
          <h1 id="wordReveal" class="word-reveal">ENTER</h1>
        </div>

        <nav class="home-nav" aria-label="Primary">
          <a class="active" href="index.html">Home</a>
          <a href="assess.html">Assess</a>
          <a href="science.html">The Science</a>
          <a href="about.html">About Us</a>
        </nav>
      </section>
    </main>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
